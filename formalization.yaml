          source: "ISBN:978-1-4704-2662-5"
        - statement: "free scalar field covariance (-Delta+m^2)^{-1}"
          source: "ISBN:978-0-387-96477-7"
    - declaration: "QFT.gaussianFreeField_satisfies_OS0"
