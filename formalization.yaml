status:
  scope: >
    Constructs the massive Gaussian Free Field (GFF) in four Euclidean spacetime
    dimensions as a probability measure mu_GFF m on the tempered distributions
    S'(R^4) (FieldConfiguration), built via the Minlos theorem from the free
    covariance (-Delta + m^2)^{-1}, and proves it satisfies all five
    Osterwalder-Schrader axioms (OS0 analyticity, OS1 regularity, OS2 Euclidean
    invariance, OS3 reflection positivity, OS4 clustering + ergodicity).
    The construction is specialized to mass m > 0 in d = 4; other dimensions and
    a Minlos-free construction are noted as planned/related work but not in scope
    here. Nuclear-space structure and the Minlos/Kolmogorov machinery are supplied
    by the external libraries bochner (BochnerMinlos), gaussian-field
    (GaussianField), and kolmogorov_extension4, all of which are axiom-free.
  sorry_count: 0
  sorry_in_definitions: 0
  axioms: []
  main_results:
    - declaration: "OSforGFF.gaussianFreeField_satisfies_all_OS_axioms"
      file: "OSforGFF/OS/Master.lean"
      sorry_count: 0
      axioms: []
      literature_dependencies:
        - statement: "the free GFF (m>0, d=4) satisfies all Osterwalder-Schrader axioms OS0-OS4"
          source: "10.1007/BF01645738"
        - statement: "reflection positivity (OS3) and OS reconstruction framework"
          source: "10.1007/BF01608978"
        - statement: "construction and proof conventions for the free Euclidean field"
          source: "ISBN:978-0-387-96477-7"
    - declaration: "gaussianFreeField_free"
      file: "OSforGFF/Measure/Construct.lean"
      sorry_count: 0
      axioms: []
      literature_dependencies:
