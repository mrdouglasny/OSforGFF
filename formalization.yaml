fidelity:
  divergences: >
    The OS axioms are formalized in the Glimm-Jaffe probability-measure
    formulation (predicates on ProbabilityMeasure FieldConfiguration) rather than
    the original Schwinger-function formulation of Osterwalder-Schrader. OS3 is
    stated in the complex star formulation (OS 1975 axiom E2) with an equivalent
    real reformulation (OS3_ReflectionPositivity_real). OS4 is split into a
    clustering statement and an ergodicity statement, with ergodicity derived from
    a polynomial-clustering bound (alpha = 6) specific to the 4D mass gap. The
    development is specialized to spacetime dimension d = 4 and mass m > 0.

